<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

  <div class="display">
    <div class="history mono" id="history"></div>
    <div class="result mono" id="result">0</div>
  </div>

  <div class="keys">
    <button class="key key-fn" data-action="clear">AC</button>
    <button class="key key-fn" data-action="delete">DEL</button>
    <button class="key key-fn" data-action="percent">%</button>
    <button class="key key-op" data-action="divide">÷</button>

    <button class="key" data-num="7">7</button>
    <button class="key" data-num="8">8</button>
    <button class="key" data-num="9">9</button>
    <button class="key key-op" data-action="multiply">×</button>

    <button class="key" data-num="4">4</button>
    <button class="key" data-num="5">5</button>
    <button class="key" data-num="6">6</button>
    <button class="key key-op" data-action="subtract">−</button>

    <button class="key" data-num="1">1</button>
    <button class="key" data-num="2">2</button>
    <button class="key" data-num="3">3</button>
    <button class="key key-op" data-action="add">+</button>

    <button class="key key-zero" data-num="0">0</button>
    <button class="key" data-num=".">.</button>
    <button class="key key-equals" data-action="equals">=</button>
  </div>

  <p class="hint mono">keyboard supported — try typing</p>
</div>

<script src="script.js"></script>
</body>
</html>
